# GitHub Actions workflow: Build, sign, and publish ModToggler releases.
# Triggered by pushing a v* tag (e.g., git tag v1.0.0 && git push --tags).
# Using tauri-action@v0 -- @v1 tag does not exist despite some docs referencing it.

name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Releasing version: $VERSION"

      - name: Patch version in project files
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const v = '${{ env.VERSION }}';

            // package.json
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

            // tauri.conf.json
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

          # Cargo.toml - replace first version line only (package version, not dependencies)
          sed -i '0,/^version = ".*"/{s/^version = ".*"/version = "${{ env.VERSION }}"/}' src-tauri/Cargo.toml

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump version to ${{ env.VERSION }}"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'ModToggler v__VERSION__'
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          generateReleaseNotes: true
